<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Your Safari | Aman Safari</title>

<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
</nav>

<div class="section">

<h2 class="section-title">Book Your Adventure</h2>

<select
id="tour"
onchange="updatePrice()"
style="width:100%; padding:12px; margin:10px 0;">
  <option value="Kilimanjaro">🏔️ Kilimanjaro Climb</option>
  <option value="Serengeti">🦁 Serengeti Safari</option>
  <option value="Ngorongoro">🌋 Ngorongoro Crater</option>
  <option value="Tarangire">🐘 Tarangire Safari</option>
  <option value="Ruaha">🦓 Ruaha Safari</option>
</select>

<input id="name" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0;">

<input
id="email"
type="email"
placeholder="Email"
style="width:100%; padding:12px; margin:10px 0;">

<input
id="date"
type="date"
style="width:100%; padding:12px; margin:10px 0;">

<input
id="people"
type="number"
min="1"
oninput="updatePrice()"
placeholder="Number of People"
style="width:100%; padding:12px; margin:10px 0;">
  <div id="priceBox"
style="
padding:15px;
margin:15px 0;
border-radius:12px;
background:rgba(212,175,55,0.15);
text-align:center;
font-size:1.1rem;
">

Estimated Price:
<strong id="priceOutput">
Select trip + people
</strong>

  </div>
  <div id="bookingSummary"
style="
display:none;
padding:18px;
border-radius:14px;
background:rgba(11,61,32,0.75);
margin-bottom:15px;
">

<h3 style="margin-bottom:10px;">
Your Selection
</h3>

<p id="summaryText"></p>

  </div>
<button class="btn" onclick="sendBooking()" style="width:100%;">
Get Instant Quote →
</button>
  <p style="
text-align:center;
margin-top:18px;
font-size:0.95rem;
opacity:0.8;
">
1. Send request → 2. We confirm availability → 3. You receive final quote
  </p>

</div>
<script>
function updatePrice(){

const prices={
Kilimanjaro:2495,
Serengeti:650,
Ngorongoro:450,
Tarangire:350,
Ruaha:550
};

const tour=
document.getElementById("tour").value;

const people=
Number(
document.getElementById("people").value
)||0;

if(!people){
document.getElementById("priceOutput")
.innerHTML=
"Select trip + people";

return;
}

const total=
prices[tour]*people;

document.getElementById("priceOutput").innerHTML =
"$" + total.toLocaleString();

document.getElementById(
"bookingSummary"
).style.display = "block";

document.getElementById(
"summaryText"
).innerHTML =
`
Tour: ${tour}<br>
Travellers: ${people}<br>
Estimated Total: $${total.toLocaleString()}
`;
}
function sendBooking() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const date = document.getElementById('date').value;
  const people = document.getElementById('people').value;
  const tour = document.getElementById('tour').value;

  if(!name || !email || !date || !people){
    alert("Please fill all fields");
    return;
  }

  const msg =
`NEW BOOKING REQUEST 🔥
Tour: ${tour}
Name: ${name}
Email: ${email}
Date: ${date}
People: ${people}

Please con⁶firm availability + price.`;

  
  window.open("https://wa.me/255699004685?text=" + encodeURIComponent(msg),
             "_blanked"
             );
}
</script>


</body>
</html>
