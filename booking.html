<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Your Safari | Aman Safari</title>

<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
</nav>

<div class="section">

<h2 class="section-title">Book Your Adventure</h2>

<select id="tour" style="width:100%; padding:12px; margin:10px 0;">
  <option value="Kilimanjaro">🏔️ Kilimanjaro Climb</option>
  <option value="Serengeti">🦁 Serengeti Safari</option>
  <option value="Ngorongoro">🌋 Ngorongoro Crater</option>
  <option value="Tarangire">🐘 Tarangire Safari</option>
  <option value="Ruaha">🦓 Ruaha Safari</option>
</select>

<input id="name" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0;">

<input
id="email"
type="email"
placeholder="Email"
style="width:100%; padding:12px; margin:10px 0;">

<input
id="date"
type="date"
style="width:100%; padding:12px; margin:10px 0;">

<input
id="people"
type="number"
min="1"
placeholder="Number of People"
style="width:100%; padding:12px; margin:10px 0;">
<button class="btn" onclick="sendBooking()" style="width:100%;">
Get Instant Quote →
</button>

</div>
<script>
function sendBooking() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const date = document.getElementById('date').value;
  const people = document.getElementById('people').value;
  const tour = document.getElementById('tour').value;

  if(!name || !email || !date || !people){
    alert("Please fill all fields");
    return;
  }

  const msg =
`NEW BOOKING REQUEST 🔥
Tour: ${tour}
Name: ${name}
Email: ${email}
Date: ${date}
People: ${people}

Please confirm availability + price.`;

  
  window.open("https://wa.me/255699004685?text=" + encodeURIComponent(msg));
}
</script>


</body>
</html>
