<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aman Safari - Kilimanjaro Booking</title>

<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<!-- NAV -->
<nav>
  <a href="index.html">Home</a>
  <a href="kilimanjaro.html">Kilimanjaro</a>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">

    <h1>Climb Kilimanjaro with Local Experts</h1>

    <p>Direct from Arusha • Licensed Guides • 98% Success Rate</p>

    <!-- BUTTON -->
    <a class="btn" href="https://wa.me/255699004685?text=Hi%20Aman%20Safari%20I%20want%20to%20book">
      Check Availability →
    </a>

  </div>
</div>

<!-- PRICE CALCULATOR -->
<div class="section">

  <h2 class="section-title">Quick Price Estimate</h2>

  <select id="tour" onchange="updatePrice()">
    <option value="Kilimanjaro">Kilimanjaro ($2495)</option>
    <option value="Serengeti">Serengeti ($650)</option>
    <option value="Ngorongoro">Ngorongoro ($450)</option>
  </select>

  <input id="people" type="number" placeholder="Number of People" oninput="updatePrice()">

  <div class="price-box">
    Total Price: <span id="priceOutput">Select options</span>
  </div>

  <button class="btn" onclick="bookNow()">
    Start Booking →
  </button>

</div>

<!-- AI CHAT BUTTON -->
<button class="chat-btn" onclick="toggleChat()">💬 Ask AI</button>

<!-- CHAT BOX -->
<div class="chat-box" id="chatBox">

  <div class="chat-header">
    Aman AI Assistant
    <span onclick="toggleChat()" style="float:right;cursor:pointer;">✕</span>
  </div>

  <div class="chat-body" id="chatBody"></div>

  <input id="chatInput" placeholder="Ask something...">
  <button onclick="sendAI()">Send</button>

</div>

<script src="assets/script.js"></script>

</body>
    </html>
