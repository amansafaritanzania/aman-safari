<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aman Safari</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

:root{
--gold:#d4af37;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
padding:16px 6%;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,.3);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
color:var(--gold);
font-weight:bold;
font-size:20px;
}

.links{
display:flex;
gap:20px;
list-style:none;
}

.links a{
color:white;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 6%;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80") center/cover;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}

.hero-content{
position:relative;
max-width:600px;
color:white;
}

.hero h1{
font-size:60px;
}

.gold{color:var(--gold);}

/* BUTTONS */
.btn{
display:inline-block;
padding:12px 20px;
margin-top:20px;
border-radius:999px;
text-decoration:none;
}

.primary{
background:var(--gold);
color:black;
font-weight:bold;
}

/* SECTION */
.section{
padding:80px 6%;
}

/* BOOKING */
.booking{
background:#111c16;
padding:30px;
border-radius:20px;
}

.booking form{
display:grid;
gap:12px;
}

.booking input,
.booking select,
.booking textarea{
padding:14px;
border:none;
border-radius:10px;
background:#1a2720;
color:white;
}

/* CHAT */
#chatBtn{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:var(--gold);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:20px;
}

#chatBox{
position:fixed;
bottom:90px;
right:20px;
width:320px;
height:420px;
background:#0b141a;
border-radius:15px;
display:none;
flex-direction:column;
overflow:hidden;
}

#top{
background:#111b21;
padding:10px;
color:white;
display:flex;
justify-content:space-between;
}

#messages{
flex:1;
padding:10px;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.msg{
padding:10px;
border-radius:10px;
max-width:75%;
}

.user{
align-self:flex-end;
background:#005c4b;
color:white;
}

.ai{
align-self:flex-start;
background:#202c33;
color:white;
}

.input{
display:flex;
padding:8px;
gap:6px;
background:#111b21;
}

.input input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#202c33;
color:white;
}

.input button{
background:var(--gold);
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div class="logo">AMAN SAFARI</div>
<ul class="links">
<li><a href="#booking">Book</a></li>
<li><a href="#parks">Parks</a></li>
</ul>
</nav>

<section class="hero">
<div class="hero-content">
<h1>Explore <span class="gold">Luxury Tanzania</span></h1>
<a class="btn primary" href="#booking">Book Now</a>
</div>
</section>

<section id="booking" class="section">
<div class="booking">
<h2>Book Safari</h2>
<form>
<input placeholder="Name">
<input placeholder="Email">
<select>
<option>Serengeti</option>
<option>Ngorongoro</option>
<option>Tarangire</option>
</select>
<input type="date">
<button type="button">Reserve</button>
</form>
</div>
</section>

<!-- CHAT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div id="top">
AI Assistant
<span onclick="toggleChat()">✖</span>
</div>

<div id="messages"></div>

<div class="input">
<input id="msg" placeholder="Ask anything...">
<button onclick="send()">➤</button>
</div>
</div>

<script>
function toggleChat(){
const box=document.getElementById("chatBox");
box.style.display = box.style.display==="flex" ? "none":"flex";
}

async function send(){
const input=document.getElementById("msg");
const msg=input.value;
if(!msg)return;

document.getElementById("messages").innerHTML+=
`<div class="msg user">${msg}</div>`;

input.value="";

const res = await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

const data = await res.json();

document.getElementById("messages").innerHTML+=
`<div class="msg ai">${data.reply}</div>`;
}
</script>

</body>
  </html>
